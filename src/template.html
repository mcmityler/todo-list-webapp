<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" type="image/png" href="./pen-solid-full.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


    <title>To Do App</title>
</head>
<body>
    <div id="container">
        <div class="projects-container">
            <h2>Projects</h2>
            <button class="sidebar-button" aria-label="collapse side bar button"><i class="fa-solid fa-bars"></i></button>
            <div class="project-list-container">
                <div class="project selected">
                    <button class="project-button" aria-label="select this project"></button>
                    <p>Default</p>
                    <button class="project-delete" aria-label="delete this project"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <button class="new-project-button">Create new project</button>
        </div>

        <div class="todos-container">
            <div class="ongoing-container">
                <h2>To Dos - Default</h2>
                <div class="project-sort-container">
                    <label for="project-sort-dropdown">Sort By: </label>
                    <select name="project-sort-dropdown" id="project-sort-dropdown">
                        <option value="default">Default</option>
                    </select>
                </div>
                <div class="ongoing-todos">
                    <div class="add-todo-container">
                        <button aria-label="Add new to do task"></button>
                        <div class="add-circle">
                            <i class="fa-solid fa-plus"></i>
                        </div>
                    </div>
                    <div class="ongoing-task">
                        <p class="due-in">Due in 20 Days!</p>
                        <p class="task-name">Task 1</p>
                        <p class="task-priority">! ! !</p>
                        <p class="task-description">Description</p>
                        <p class="task-dueDate">Due Date: 01-01-2000</p>
                        <button class="task-edit">Edit</button>
                        <button class="task-complete">Mark Complete</button>
                        <button class="task-delete" aria-label="delete this ongoing task"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            </div>
            <div class="completed-container">
                <h2>Completed</h2>
                <div class="completed-todos">
                    <div class="completed-task">
                        <button class="task-uncomplete"></button>
                        <p class="completed-name">Name</p>
                        <p class="completed-date">02-02-2222</p>
                        <button class="completed-delete" aria-label="delete this completed task"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <dialog id="new-project-dialog">
        <div class="project-dialog-container">
            <h2 class="form-title">Create New Project</h2>
            <form id="new-project-form">
                <div class="project-name-container input-container">
                    <input type="text" name="project-name-input" id="title-input" placeholder="" maxlength="16" required autocomplete="off"/>
                    <label for="project-name-input" class="hover-pointer">Project Name<span class="asterisk">*</span></label>
                </div>
                <button class="submit-project-button hover-pointer">Submit new project</button>
            </form>
            <button class="close-project-dialog-button hover-pointer" aria-label="Close New Project Form"><i class="fa-solid fa-x"></i></button>
        </div>
    </dialog>

    <dialog id="new-todo-dialog">
        <div class="todo-dialog-container">
            <h2 class="todo-form-title">New <span class="todo-project">*********</span> To Do</h2>
            <form id="new-todo-form">
                <div class="todo-name-container input-container">
                    <input type="text" name="todo-name-input" id="todo-name-input" placeholder="" maxlength="26" required autocomplete="off"/>
                    <label for="todo-name-input" class="hover-pointer">Task Name<span class="asterisk">*</span></label>
                </div>

                <label for="todo-description" class="hover-pointer" >Description: </label>
                <textarea name="todo-description" id="todo-description" placeholder="" maxlength="50" autocomplete="off"></textarea>
                
                <label class="new-priority-title" for="">Priority:</label>
                <div class="priority-initial-container">
                    <input type="radio" name="priority-initial" id="priority-1" 
                    class="priority-radio priority-initial" value="1" checked>

                    <label for="priority-1"><i class="fa-solid fa-exclamation"></i></label>
                    
                    <input type="radio" name="priority-initial" id="priority-2"
                    class="priority-radio priority-initial" value="2">

                    <label for="priority-2"><i class="fa-solid fa-exclamation"></i></label>
                    
                    <input type="radio" name="priority-initial" id="priority-3" 
                    class="priority-radio priority-initial" value="3">

                    <label for="priority-3"><i class="fa-solid fa-exclamation"></i></label>
                    
                    <input type="radio" name="priority-initial" id="priority-4" 
                    class="priority-radio priority-initial" value="4">

                    <label for="priority-4"><i class="fa-solid fa-exclamation"></i></label>
                    
                    <input type="radio" name="priority-initial" id="priority-5" 
                    class="priority-radio priority-initial" value="5">
                    
                    <label for="priority-5"><i class="fa-solid fa-exclamation"></i></label>
                </div>
                <div class="due-date-check-container">
                    <label for="due-date-checkbox">Has Due Date?</label>
                    <input type="checkbox" id="due-date-checkbox" name="due-date-checkbox"/>
                </div>
                <div class="due-date-container">
                    <label for="due-date-selector">Due Date:</label>
                    <input type="date" id="due-date-selector" name="due-date-selector">
                </div>
                <button class="submit-todo-button hover-pointer">Submit new to do</button>
            </form>
            <button class="close-todo-dialog-button hover-pointer" aria-label="Close New To Do Form"><i class="fa-solid fa-x"></i></button>
        </div>
    </dialog>
</body>
</html>
