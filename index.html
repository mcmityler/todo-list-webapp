<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" type="image/png" href="48d5511aacaa4e4de71a.svg"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"><title>To Do App</title><script defer="defer" src="app.bundle.js"></script></head><body><main><div id="container"><div class="projects-container"><h2>Projects</h2><button class="sidebar-button hover-pointer" aria-label="collapse side bar button"><i class="fa-solid fa-bars"></i></button><div class="project-list-container"></div><button class="new-project-button hover-pointer">Create new project</button></div><div class="todos-container"><div class="ongoing-container"><h2>To Dos - <span class="todo-project-title">********</span></h2><div class="project-sort-container"><label for="project-sort-dropdown">Sort By:</label> <select name="project-sort-dropdown" id="project-sort-dropdown"><option value="default">Default</option><option value="priority">Priority</option></select></div><div class="ongoing-todos"></div></div><div class="completed-container"><h2>Completed</h2><h2 class="date-completed-title">Date Finished</h2><div class="completed-todos"></div></div></div></div></main><dialog id="new-project-dialog"><div class="project-dialog-container"><h2 class="form-title">Create New Project</h2><form id="new-project-form"><div class="project-name-container input-container"><input name="project-name-input" id="title-input" placeholder="" maxlength="16" required autocomplete="off"/> <label for="project-name-input" class="hover-pointer">Project Name<span class="asterisk">*</span></label></div><button class="submit-project-button hover-pointer">Submit new project</button></form><button class="close-project-dialog-button hover-pointer" aria-label="Close New Project Form"><i class="fa-solid fa-x"></i></button></div></dialog><dialog id="new-todo-dialog"><div class="todo-dialog-container"><h2 class="todo-form-title"><span class="todo-form-NewEdit">New</span><span class="todo-project">*********</span> To Do</h2><form id="new-todo-form"><div class="todo-name-container input-container"><input name="todo-name-input" id="todo-name-input" placeholder="" maxlength="15" required autocomplete="off"/> <label for="todo-name-input" class="hover-pointer">Task Name<span class="asterisk">*</span></label></div><label for="todo-description" class="hover-pointer">Description:</label> <textarea name="todo-description" id="todo-description" placeholder="" maxlength="80" autocomplete="off"></textarea> <label class="new-priority-title" for="">Priority:</label><div class="priority-initial-container"><input type="radio" name="priority-initial" id="priority-1" class="priority-radio priority-initial" value="1" checked="checked"> <label for="priority-1"><i class="fa-solid fa-exclamation"></i></label> <input type="radio" name="priority-initial" id="priority-2" class="priority-radio priority-initial" value="2"> <label for="priority-2"><i class="fa-solid fa-exclamation"></i></label> <input type="radio" name="priority-initial" id="priority-3" class="priority-radio priority-initial" value="3"> <label for="priority-3"><i class="fa-solid fa-exclamation"></i></label> <input type="radio" name="priority-initial" id="priority-4" class="priority-radio priority-initial" value="4"> <label for="priority-4"><i class="fa-solid fa-exclamation"></i></label> <input type="radio" name="priority-initial" id="priority-5" class="priority-radio priority-initial" value="5"> <label for="priority-5"><i class="fa-solid fa-exclamation"></i></label></div><div class="due-date-check-container"><label for="due-date-checkbox" class="hover-pointer">Has Due Date?</label> <input type="checkbox" class="hover-pointer" id="due-date-checkbox" name="due-date-checkbox"/></div><div class="due-date-container"><label for="due-date-selector" class="hover-pointer">Due Date:</label> <input type="date" id="due-date-selector" name="due-date-selector" class="hover-pointer"></div><button class="submit-todo-button hover-pointer">Submit new to do</button></form><button class="close-todo-dialog-button hover-pointer" aria-label="Close New To Do Form"><i class="fa-solid fa-x"></i></button></div></dialog></body></html>
